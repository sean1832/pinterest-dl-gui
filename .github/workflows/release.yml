name: Release

# Build and publish the Windows executable when a version tag is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release and upload the exe

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT" # v1.2.3 -> 1.2.3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: pip install -r requirements.txt nuitka

      - name: Build executable
        run: python build.py --release --version ${{ steps.version.outputs.version }}

      - name: Rename artifact with version
        shell: bash
        run: mv dist/pinterest-dl.exe "dist/pinterest-dl-${{ steps.version.outputs.version }}.exe"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pinterest-dl-${{ steps.version.outputs.version }}.exe
