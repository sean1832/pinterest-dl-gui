name: Release

# Build and publish the Windows executable when a stable version tag is pushed.
on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*" # version tags like 1.2.3 (glob, not regex)

permissions:
  contents: write # required to create the release and upload the artifact

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT" # tag is already 1.2.3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: pip install -r requirements.txt nuitka

      - name: Build executable
        env:
          # CI is non-interactive; let Nuitka fetch the dependency walker it needs
          # for onefile builds instead of prompting and aborting.
          NUITKA_ASSUME_YES_FOR_DOWNLOADS: "1"
        run: python build.py --release --version ${{ steps.version.outputs.version }}

      - name: Package artifact
        shell: pwsh
        # exe keeps its name; bundle it with the license into a versioned zip
        run: Compress-Archive -Path dist/pinterest-dl.exe, LICENSE -DestinationPath "dist/pinterest-dl-gui_windows_${{ steps.version.outputs.version }}.zip"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pinterest-dl-gui_windows_${{ steps.version.outputs.version }}.zip
